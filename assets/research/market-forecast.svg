1.</text><rect x="810" y="1390" width="720" height="360" rx="18" fill="#141a24" opacity="1" stroke="none" stroke-width="0"/><text x="844" y="1438" font-family="DejaVu Sans, sans-serif" font-size="30" fill="#e6e9ef" font-weight="bold" text-anchor="start" letter-spacing="0" opacity="1">What the model implies</text><circle cx="854" cy="1474" r="6" fill="#ec4899"/><text x="876" y="1482" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#e6e9ef" font-weight="bold" text-anchor="start" letter-spacing="0" opacity="1">OnlyFans = the cash, not the bet</text><text x="876" y="1509" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#93a0b4" font-weight="normal" text-anchor="start" letter-spacing="0" opacity="1">dominant but matured (~10%/yr) and only reachable via gateways</text><circle cx="854" cy="1546" r="6" fill="#ec4899"/><text x="876" y="1554" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#e6e9ef" font-weight="bold" text-anchor="start" letter-spacing="0" opacity="1">Fanvue = the asymmetric bet</text><text x="876" y="1581" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#93a0b4" font-weight="normal" text-anchor="start" letter-spacing="0" opacity="1">compounding ~60–70%/yr AND officially integratable — our first adapter</text><circle cx="854" cy="1618" r="6" fill="#ec4899"/><text x="876" y="1626" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#e6e9ef" font-weight="bold" text-anchor="start" letter-spacing="0" opacity="1">Fansly = optional gateway add‑on</text><text x="876" y="1653" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#93a0b4" font-weight="normal" text-anchor="start" letter-spacing="0" opacity="1">steady, but same ToS/ban posture as OnlyFans</text><circle cx="854" cy="1690" r="6" fill="#ec4899"/><text x="876" y="1698" font-family="DejaVu Sans, sans-serif" font-size="23" fill="#e6e9ef" font-weight="bold" text-anchor="start" letter-spacing="0" opacity="1">Reddit = sanctioned top‑of‑funnel</text><text x=